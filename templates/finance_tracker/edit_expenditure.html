{% extends 'dashboard_base.html' %}

{% block title %}Edit Expenditure{% endblock %}
{% block page_title %}Edit Expenditure{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Edit Expenditure {{ expenditure.expenditure_id }}</h5>
            <a href="{% url 'finance_tracker:view_expenditures' %}" class="btn btn-secondary btn-sm">Back</a>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary btn-sm">Update Expenditure</button>
                <a href="{% url 'finance_tracker:view_expenditures' %}" class="btn btn-light btn-sm">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
