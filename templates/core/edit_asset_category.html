{% extends 'dashboard_base.html' %}
{% load static %}

{% block title %}Edit Asset Category - Golam Financial Services{% endblock %}
{% block page_title %}Edit Asset Category{% endblock %}

{% block content %}
<div class="container-fluid"><div class="row"><div class="col-12"><div class="card"><div class="card-header d-flex justify-content-between align-items-center"><h4 class="card-title"><i class="fas fa-boxes"></i> Edit Asset Category</h4><a href="{% url 'core:view_asset_categories' %}" class="btn btn-secondary btn-sm"><i class="fas fa-arrow-left"></i> Back to Asset Categories</a></div><div class="card-body p-compact"><form method="post">{% csrf_token %}<div class="row mb-3"><div class="col-md-6"><div class="form-group"><label for="name" class="form-label">Category Name <span class="text-danger">*</span></label><input type="text" class="form-control form-control-sm" id="name" name="name" value="{{ category.name }}" required></div></div><div class="col-md-6"><div class="form-group"><label for="code" class="form-label">Category Code <span class="text-danger">*</span></label><input type="text" class="form-control form-control-sm" id="code" name="code" value="{{ category.code }}" required></div></div></div><div class="row mb-3"><div class="col-md-4"><div class="form-group"><label for="depreciation_method" class="form-label">Depreciation Method <span class="text-danger">*</span></label><select class="form-control form-control-sm" id="depreciation_method" name="depreciation_method" required>{% for value, label in depreciation_methods %}<option value="{{ value }}" {% if category.depreciation_method == value %}selected{% endif %}>{{ label }}</option>{% endfor %}</select></div></div><div class="col-md-4"><div class="form-group"><label for="depreciation_rate" class="form-label">Depreciation Rate (%)</label><input type="number" class="form-control form-control-sm" id="depreciation_rate" name="depreciation_rate" value="{{ category.depreciation_rate }}" min="0" step="0.01"></div></div><div class="col-md-4"><div class="form-group"><label for="useful_life_years" class="form-label">Useful Life (Years)</label><input type="number" class="form-control form-control-sm" id="useful_life_years" name="useful_life_years" value="{{ category.useful_life_years }}" min="1"></div></div></div><div class="row mb-3"><div class="col-12"><div class="form-group"><label for="description" class="form-label">Description</label><textarea class="form-control form-control-sm" id="description" name="description" rows="3">{{ category.description }}</textarea></div></div></div><div class="form-group mt-4"><button type="submit" class="btn btn-primary btn-sm"><i class="fas fa-save"></i> Update Asset Category</button><a href="{% url 'core:view_asset_categories' %}" class="btn btn-secondary btn-sm"><i class="fas fa-times"></i> Cancel</a></div></form></div></div></div></div></div>
{% endblock %}
