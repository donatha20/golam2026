{% extends 'dashboard_base.html' %}
{% load static %}

{% block title %}Edit Loan Sector - Golam Financial Services{% endblock %}

{% block page_title %}Edit Loan Sector{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h4 class="card-title">
                        <i class="fas fa-edit"></i> Edit Loan Sector: {{ sector.name }}
                    </h4>
                    <a href="{% url 'core:view_loan_sectors' %}" class="btn btn-secondary btn-sm">
                        <i class="fas fa-arrow-left"></i> Back to Loan Sectors
                    </a>
                </div>
                <div class="card-body p-compact">
                    <form method="post">
                        {% csrf_token %}

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="name" class="form-label">Sector Name <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control form-control-sm" id="name" name="name" value="{{ sector.name }}" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="code" class="form-label">Sector Code <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control form-control-sm" id="code" name="code" value="{{ sector.code }}" required>
                                </div>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="risk_level" class="form-label">Risk Level <span class="text-danger">*</span></label>
                                    <select class="form-control form-control-sm" id="risk_level" name="risk_level" required>
                                        {% for value, label in risk_levels %}
                                            <option value="{{ value }}" {% if sector.risk_level == value %}selected{% endif %}>{{ label }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-12">
                                <div class="form-group">
                                    <label for="description" class="form-label">Description</label>
                                    <textarea class="form-control form-control-sm" id="description" name="description" rows="4" placeholder="Enter sector description...">{{ sector.description|default:'' }}</textarea>
                                </div>
                            </div>
                        </div>

                        <div class="form-group mt-4">
                            <button type="submit" class="btn btn-primary btn-sm">
                                <i class="fas fa-save"></i> Update Loan Sector
                            </button>
                            <a href="{% url 'core:view_loan_sectors' %}" class="btn btn-secondary btn-sm">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
