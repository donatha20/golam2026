{% extends 'dashboard_base.html' %}
{% load static %}

{% block title %}Edit Working Mode - Golam Financial Services{% endblock %}

{% block page_title %}Edit Working Mode{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h4 class="card-title">
                        <i class="fas fa-edit"></i> Edit Working Mode
                    </h4>
                    <a href="{% url 'core:view_working_modes' %}" class="btn btn-secondary btn-sm">
                        <i class="fas fa-arrow-left"></i> Back to Working Modes
                    </a>
                </div>
                <div class="card-body p-compact">
                    <form method="post">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-md-12">
                                <div class="form-group mb-3">
                                    <label for="name" class="form-label">Working Mode Name <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control form-control-sm" id="name" name="name" value="{{ mode.name }}" required>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-12">
                                <div class="form-group mb-3">
                                    <label class="form-label">Working Days <span class="text-danger">*</span></label>
                                    <div class="row">
                                        <div class="col-md-3">
                                            <div class="form-check">
                                                <input type="checkbox" class="form-check-input" id="monday_enabled" name="monday_enabled" {% if mode.monday_enabled %}checked{% endif %}>
                                                <label class="form-check-label" for="monday_enabled">Monday</label>
                                            </div>
                                        </div>
                                        <div class="col-md-3">
                                            <div class="form-check">
                                                <input type="checkbox" class="form-check-input" id="tuesday_enabled" name="tuesday_enabled" {% if mode.tuesday_enabled %}checked{% endif %}>
                                                <label class="form-check-label" for="tuesday_enabled">Tuesday</label>
                                            </div>
                                        </div>
                                        <div class="col-md-3">
                                            <div class="form-check">
                                                <input type="checkbox" class="form-check-input" id="wednesday_enabled" name="wednesday_enabled" {% if mode.wednesday_enabled %}checked{% endif %}>
                                                <label class="form-check-label" for="wednesday_enabled">Wednesday</label>
                                            </div>
                                        </div>
                                        <div class="col-md-3">
                                            <div class="form-check">
                                                <input type="checkbox" class="form-check-input" id="thursday_enabled" name="thursday_enabled" {% if mode.thursday_enabled %}checked{% endif %}>
                                                <label class="form-check-label" for="thursday_enabled">Thursday</label>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="row mt-2">
                                        <div class="col-md-3">
                                            <div class="form-check">
                                                <input type="checkbox" class="form-check-input" id="friday_enabled" name="friday_enabled" {% if mode.friday_enabled %}checked{% endif %}>
                                                <label class="form-check-label" for="friday_enabled">Friday</label>
                                            </div>
                                        </div>
                                        <div class="col-md-3">
                                            <div class="form-check">
                                                <input type="checkbox" class="form-check-input" id="saturday_enabled" name="saturday_enabled" {% if mode.saturday_enabled %}checked{% endif %}>
                                                <label class="form-check-label" for="saturday_enabled">Saturday</label>
                                            </div>
                                        </div>
                                        <div class="col-md-3">
                                            <div class="form-check">
                                                <input type="checkbox" class="form-check-input" id="sunday_enabled" name="sunday_enabled" {% if mode.sunday_enabled %}checked{% endif %}>
                                                <label class="form-check-label" for="sunday_enabled">Sunday</label>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="start_time" class="form-label">Start Time <span class="text-danger">*</span></label>
                                    <input type="time" class="form-control form-control-sm" id="start_time" name="start_time" value="{{ mode.start_time|time:'H:i' }}" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="end_time" class="form-label">End Time <span class="text-danger">*</span></label>
                                    <input type="time" class="form-control form-control-sm" id="end_time" name="end_time" value="{{ mode.end_time|time:'H:i' }}" required>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="lunch_start" class="form-label">Lunch Start Time</label>
                                    <input type="time" class="form-control form-control-sm" id="lunch_start" name="lunch_start" value="{{ mode.lunch_start|time:'H:i' }}">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="lunch_end" class="form-label">Lunch End Time</label>
                                    <input type="time" class="form-control form-control-sm" id="lunch_end" name="lunch_end" value="{{ mode.lunch_end|time:'H:i' }}">
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="timezone" class="form-label">Timezone</label>
                                    <select class="form-control form-control-sm" id="timezone" name="timezone">
                                        {% for value, label in timezone_choices %}
                                            <option value="{{ value }}" {% if value == mode.timezone %}selected{% endif %}>{{ label }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <div class="form-check mt-4">
                                        <input type="checkbox" class="form-check-input" id="allow_backdating" name="allow_backdating" {% if mode.allow_backdating %}checked{% endif %}>
                                        <label class="form-check-label" for="allow_backdating">
                                            Allow Backdating
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <button type="submit" class="btn btn-primary btn-sm">
                                <i class="fas fa-save"></i> Update Working Mode
                            </button>
                            <a href="{% url 'core:view_working_modes' %}" class="btn btn-secondary btn-sm">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
