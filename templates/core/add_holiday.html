{% extends 'dashboard_base.html' %}
{% load static %}

{% block title %}Add Public Holiday - Golam Financial Services{% endblock %}
{% block page_title %}Add Public Holiday{% endblock %}

{% block content %}
<div class="container-fluid"><div class="row"><div class="col-12"><div class="card"><div class="card-header d-flex justify-content-between align-items-center"><h4 class="card-title"><i class="fas fa-calendar-alt"></i> Add New Public Holiday</h4><a href="{% url 'core:view_holidays' %}" class="btn btn-secondary btn-sm"><i class="fas fa-arrow-left"></i> Back to Holidays</a></div><div class="card-body p-compact"><form method="post">{% csrf_token %}<div class="row mb-3"><div class="col-md-6"><div class="form-group"><label for="name" class="form-label">Holiday Name <span class="text-danger">*</span></label><input type="text" class="form-control form-control-sm" id="name" name="name" required></div></div><div class="col-md-6"><div class="form-group"><label for="date" class="form-label">Date <span class="text-danger">*</span></label><input type="date" class="form-control form-control-sm" id="date" name="date" required></div></div></div><div class="row mb-3"><div class="col-md-6"><div class="form-check mt-2"><input type="checkbox" class="form-check-input" id="is_recurring" name="is_recurring"><label class="form-check-label" for="is_recurring">Recurring every year</label></div></div></div><div class="row mb-3"><div class="col-12"><div class="form-group"><label for="description" class="form-label">Description</label><textarea class="form-control form-control-sm" id="description" name="description" rows="3" placeholder="Enter holiday description..."></textarea></div></div></div><div class="form-group mt-4"><button type="submit" class="btn btn-primary btn-sm"><i class="fas fa-save"></i> Save Holiday</button><a href="{% url 'core:view_holidays' %}" class="btn btn-secondary btn-sm"><i class="fas fa-times"></i> Cancel</a></div></form></div></div></div></div></div>
{% endblock %}
