{% extends 'dashboard_base.html' %}

{% block title %}Deactivate Group{% endblock %}
{% block page_title %}Deactivate Group{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="card border-warning">
        <div class="card-header bg-warning">
            Confirm Deactivation
        </div>
        <div class="card-body">
            <p>Deactivate group <strong>{{ group.group_name }}</strong> ({{ group.group_id }})?</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-warning btn-sm">Deactivate</button>
                <a href="{% url 'borrowers:group_list' %}" class="btn btn-secondary btn-sm">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
