<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Sent - Golam Financial Services</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Poppins', Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg,  #ffffff 0%, #f2f1f2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 575px) {
            body {
                min-height: 100dvh;
                align-items: stretch;
                background: #ffffff;
            }
            .auth-container {
                max-width: none;
                padding: 0;
            }
            .auth-card {
                min-height: 100dvh;
                border-radius: 0;
                box-shadow: none;
                padding: 28px 18px;
            }
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 16px;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .auth-logo i {
            color: white;
            font-size: 24px;
        }

        .auth-header h2 {
            color: #333;
            margin: 0 0 10px;
            font-weight: 600;
        }

        .auth-header p {
            color: #666;
            margin: 0;
            font-size: 12px;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid transparent;
        }

        .alert-info {
            background-color: #d1ecf1;
            border-color: #bee5eb;
            color: #0c5460;
        }

        .alert ul {
            margin: 0;
            padding-left: 20px;
        }

        .alert li {
            margin-bottom: 5px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
            cursor: pointer;
        }

        .btn-outline-primary {
            background: transparent;
            color: #1e7570;
            border: 2px solid #1e7570;
        }

        .btn-outline-primary:hover {
            background: #1e7570;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(30, 117, 112, 0.3);
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
        }

        .auth-footer a {
            color: #1e7570;
            text-decoration: none;
            font-size: 12px;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .text-muted {
            color: #666;
        }

        .me-2 {
            margin-right: 0.5rem;
        }

        .mt-2 {
            margin-top: 0.5rem;
        }

        .mt-3 {
            margin-top: 1rem;
        }

        .mb-0 {
            margin-bottom: 0;
        }

        .text-decoration-none {
            text-decoration: none;
        }

        small {
            font-size: 0.875em;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h2>Check Your Email</h2>
                <p>We've sent you a password reset link at the email address you provided.</p>
            </div>
            
            <div class="alert alert-info">
                <i class="fas fa-info-circle me-2"></i>
                <strong>Next Steps:</strong>
                <ul class="mb-0 mt-2">
                    <li>Check your email inbox (and spam folder)</li>
                    <li>Click the reset link in the email</li>
                    <li>Create a new password</li>
                </ul>
            </div>
            
            <div class="auth-footer">
                <div>
                    <a href="{% url 'login' %}" class="btn btn-outline-primary">
                        <i class="fas fa-arrow-left me-2"></i>Back to Login
                    </a>
                </div>
                
                <div class="mt-3">
                    <small class="text-muted">
                        Didn't receive the email? 
                        <a href="{% url 'password_reset' %}" class="text-decoration-none">Try again</a>
                    </small>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
