version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://microfinance:password@db:5432/microfinance_db
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - db
      - redis
    restart: unless-stopped
    command: gunicorn microfinance_system.wsgi:application --bind 0.0.0.0:8000 --workers 3

  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=microfinance_db
      - POSTGRES_USER=microfinance
      - POSTGRES_PASSWORD=password
    restart: unless-stopped
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    ports:
      - "6379:6379"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - web
    restart: unless-stopped

  celery:
    build: .
    command: celery -A microfinance_system worker -l info
    volumes:
      - .:/app
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://microfinance:password@db:5432/microfinance_db
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - db
      - redis
    restart: unless-stopped

  celery-beat:
    build: .
    command: celery -A microfinance_system beat -l info
    volumes:
      - .:/app
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://microfinance:password@db:5432/microfinance_db
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - db
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
